<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Registration | OM Trading Company</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
    min-height:100vh;
}

.header{
    background:#0f4c81;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:700;
}

.container{
    width:90%;
    max-width:1000px;
    margin:40px auto;
}

.form-card{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.title{
    text-align:center;
    color:#0f4c81;
    margin-bottom:30px;
    font-size:32px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#374151;
}

input,select,textarea{
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#0f4c81;
}

textarea{
    resize:none;
}

.full-width{
    grid-column:1/-1;
}

.btn{
    width:100%;
    background:#16a34a;
    color:white;
    border:none;
    padding:16px;
    border-radius:10px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    margin-top:25px;
}

.btn:hover{
    background:#15803d;
}

.success{
    margin-top:20px;
    background:#dcfce7;
    color:#166534;
    padding:15px;
    border-radius:10px;
    display:none;
}

@media(max-width:768px){

.form-card{
padding:25px;
}

.title{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="header">
OM Trading Company
</div>

<div class="container">

<div class="form-card">

<h2 class="title">Farmer Registration Form</h2>

<form id="farmerForm">

<div class="form-grid">

<div class="form-group">
<label>Farmer Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" id="mobile" required>
</div>

<div class="form-group">
<label>Aadhaar Number</label>
<input type="text" id="aadhaar">
</div>

<div class="form-group">
<label>Village</label>
<input type="text" id="village" required>
</div>

<div class="form-group">
<label>District</label>
<input type="text" id="district" required>
</div>

<div class="form-group">
<label>State</label>
<input type="text" id="state" value="Haryana">
</div>

<div class="form-group">
<label>Crop Type</label>
<select id="crop">
<option>Wheat</option>
<option>Paddy</option>
<option>Mustard</option>
<option>Bajra</option>
<option>Cotton</option>
<option>Maize</option>
</select>
</div>

<div class="form-group">
<label>Quantity (Quintal)</label>
<input type="number" id="quantity" required>
</div>

<div class="form-group">
<label>Bank Name</label>
<input type="text" id="bank">
</div>

<div class="form-group">
<label>Account Number</label>
<input type="text" id="account">
</div>

<div class="form-group">
<label>IFSC Code</label>
<input type="text" id="ifsc">
</div>

<div class="form-group">
<label>Land Area (Acres)</label>
<input type="number" id="land">
</div>

<div class="form-group full-width">
<label>Address</label>
<textarea rows="4" id="address"></textarea>
</div>

</div>

<button type="submit" class="btn">
Register Farmer
</button>

</form>

<div class="success" id="successMsg">
Farmer Registered Successfully.
</div>

</div>

</div>

<script>

document.getElementById("farmerForm").addEventListener("submit", async function(e){

e.preventDefault();

const farmerData = {

name: document.getElementById("name").value,
mobile: document.getElementById("mobile").value,
aadhaar: document.getElementById("aadhaar").value,
village: document.getElementById("village").value,
district: document.getElementById("district").value,
state: document.getElementById("state").value,
crop: document.getElementById("crop").value,
quantity: document.getElementById("quantity").value,
bank: document.getElementById("bank").value,
account: document.getElementById("account").value,
ifsc: document.getElementById("ifsc").value,
land: document.getElementById("land").value,
address: document.getElementById("address").value

};

console.log(farmerData);

/* Backend API */

try{

await fetch("http://localhost:5000/api/farmers",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(farmerData)

});

document.getElementById("successMsg").style.display="block";

document.getElementById("farmerForm").reset();

}catch(error){

alert("Backend not connected");

}

});
</script>
</body>
</html>
